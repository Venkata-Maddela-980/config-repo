global:
  message: Welcome to customer service dev environment!!
server:
  port: 8082
message: Hello from Dev!
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/your_db_name
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # create | update | validate | none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
